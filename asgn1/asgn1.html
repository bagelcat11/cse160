<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <title>Asgn1: Painting Program</title>
    <!-- <link rel="stylesheet" href="asgn1.css"> -->
  </head>

  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>

    <div>
      <label><strong>Shape: </strong></label>
      <!-- radio button input could be nicer here... -->
      <input type="radio" id="selectPoint" name="shapeSelect" value="point" checked/>
      <label for="selectPoint">Point</label>
      <input type="radio" id="selectTriangle" name="shapeSelect" value="triangle"/>
      <label for="selectTriangle">Triangle</label>
      <input type="radio" id="selectCircle" name="shapeSelect" value="circle"/>
      <label for="selectCircle">Circle</label>
      <!-- <select id="shapeSelector"> -->
        <!-- <option value="point">Point</option> -->
        <!-- <option value="triangle">Triangle</option> -->
        <!-- <option value="circle">Circle</option> -->
      <!-- </select> -->
    </div>
    <div>
      <label><strong>Color: </strong>Red</label>
      <input type="range" min="0" max="100" value="100" class="slider" id="redSlider">
      <label>Green</label>
      <input type="range" min="0" max="100" value="100" class="slider" id="greenSlider">
      <label>Blue</label>
      <input type="range" min="0" max="100" value="100" class="slider" id="blueSlider">
    </div>
    <div>
      <label><strong>Size: </strong></label>
      <input type="range" min="2" max="40" value="10" class="slider" id="sizeSlider">
      <label><strong>(Circles) segment count: </strong></label>
      <input type="range" min="5" max="32" value="16" class="slider" id="segmentCountSlider">
    </div>
    <div>
      <button id="clearButton">Clear canvas</button>
    </div>

    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <!-- <script src="lib/cuon-matrix-cse160.js"></script> -->
    <script src="Point.js"></script>
    <script src="Triangle.js"></script>
    <script src="Circle.js"></script>
    <script src="asgn1.js"></script>

  </body>
</html>
