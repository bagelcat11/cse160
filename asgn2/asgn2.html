<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <title>Asgn2: 3D Blocky Animal</title>
  </head>

  <body onload="main()">
    <div>
      <canvas id="webgl" width="400" height="400">
        Please use a browser that supports "canvas"
      </canvas>
    </div>

    <div>
      <p>FPS: <span id="fpsCounter"></span></p>
    </div>
    <div>
      <label><strong>Camera horizontal: </strong></label>
      <input type="range" min="0" max="360" value="45" class="slider" id="cameraXSlider">
    </div>
    <div>
      <label><strong>Camera vertical: </strong></label>
      <input type="range" min="0" max="180" value="90" class="slider" id="cameraYSlider">
    </div>
    <div>
      <label><strong>Camera zoom: </strong></label>
      <input type="range" min="1" max="5" value="4" class="slider" id="cameraZoomSlider">
    </div>
    <p></p>
    <div>
      <label><strong>Auto animate: </strong></label>
      <input type="radio" id="animOn" name="autoAnimToggle" value="on" checked/>
      <label for="bobOn">On</label>
      <input type="radio" id="animOff" name="autoAnimToggle" value="off"/>
      <label for="bobOff">Off</label>
    </div>
    <!-- <div>
      <label><strong>Rotate blue: </strong></label>
      <input type="range" min="0" max="90" value="0" class="slider" id="blueSlider">
    </div>
    <div>
      <label><strong>Rotate green: </strong></label>
      <input type="range" min="-90" max="90" value="0" class="slider" id="greenSlider">
    </div> -->

    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="Shape.js"></script>
    <script src="Cube.js"></script>
    <script src="Head.js"></script>
    <script src="Ear.js"></script>
    <script src="Body.js"></script>
    <script src="Jaw.js"></script>
    <script src="asgn2.js"></script>

  </body>
</html>
